  - title: Listening IELTS-up Sample 5.4
    description: Real IELTS-up listening sample (Section 4) with validated answer key.
    time_limit: 900
    is_active: true
    voice_url: https://ielts-up.com/listening/5.4.mp3
    parts:
      - title: Section 4
        order: 1
        blocks:
          - title: Questions 31-35
            description: Choose the correct letter, A, B, or C.
            block_type: multiple_choice
            order: 1
            questions:
              - order: 1
                question_text: Initially, the Great Wall was built to
                options:
                  - option_text: A. prevent invaders from entering China
                    is_correct: true
                  - option_text: B. function as a psychological barrier
                    is_correct: false
                  - option_text: C. show country's enduring strength
                    is_correct: false
              - order: 2
                question_text: The construction of the Great Wall started
                options:
                  - option_text: A. in third century B.C.
                    is_correct: false
                  - option_text: B. in 220 B.C.
                    is_correct: true
                  - option_text: C. in 390 A.D.
                    is_correct: false
              - order: 3
                question_text: The Chinese name of the monument is
                options:
                  - option_text: A. the Great Wall
                    is_correct: false
                  - option_text: B. the Big Wall
                    is_correct: false
                  - option_text: C. the Long Wall
                    is_correct: true
              - order: 4
                question_text: The wall as it exists today was constructed mainly by
                options:
                  - option_text: A. Qin dynasty
                    is_correct: false
                  - option_text: B. Northern Wei dynasty
                    is_correct: false
                  - option_text: C. Ming dynasty
                    is_correct: true
              - order: 5
                question_text: During the Ming dynasty, the wall's main purpose was
                options:
                  - option_text: A. to be a military fortification
                    is_correct: false
                  - option_text: B. to protect caravans traveling along the trade routes
                    is_correct: false
                  - option_text: C. to contribute to the defense of the country
                    is_correct: true

          - title: Questions 36-40
            description: Complete the sentences. Write NO MORE THAN THREE WORDS for each answer.
            block_type: summary_completion
            order: 2
            questions:
              - order: 1
                question_text: Before the use of bricks, the Great Wall was mainly built from stones, wood and ___.
                answers:
                  - rammed earth
              - order: 2
                question_text: Many western sections of the wall are constructed from mud and thus are more ___.
                answers:
                  - susceptible to erosion
              - order: 3
                question_text: A part of the wall in Gansu province may disappear in the next 20 years, due to ___.
                answers:
                  - frequent sandstorms
              - order: 4
                question_text: To see the wall from the Moon would require superhuman ___.
                answers:
                  - eyesight
              - order: 5
                question_text: The Great Wall is generally recognized as one of the most impressive ___ in history.
                answers:
                  - architectural feats
