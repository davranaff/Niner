# Real listening fixtures sourced from IELTS-up sample 5 sections.
# Source pages:
# - https://ielts-up.com/listening/ielts-listening-sample-5.1.html
# - https://ielts-up.com/listening/ielts-listening-sample-5.2.html
# - https://ielts-up.com/listening/ielts-listening-sample-5.3.html
# - https://ielts-up.com/listening/ielts-listening-sample-5.4.html

tests:
  - title: Listening IELTS-up Sample 5.1
    description: Real IELTS-up listening sample (Section 1) with validated answer key.
    time_limit: 900
    is_active: true
    voice_url: https://ielts-up.com/listening/5.1.mp3
    parts:
      - title: Section 1
        order: 1
        blocks:
          - title: Questions 1-5
            description: Complete the information below. Write NO MORE THAN ONE WORD OR A NUMBER for each answer.
            block_type: form_completion
            order: 1
            questions:
              - order: 1
                question_text: Street number (Bridge street)
                answers:
                  - "32"
              - order: 2
                question_text: Included utility after gas, heat and water
                answers:
                  - electricity
              - order: 3
                question_text: Not included utility
                answers:
                  - internet
              - order: 4
                question_text: Public transport option besides underground
                answers:
                  - bus
              - order: 5
                question_text: Tenant surname (John ___)
                answers:
                  - hooper

          - title: Questions 6-8
            description: Choose THREE letters, A-F. Which THREE things should the caller bring to the meeting?
            block_type: list_of_options
            order: 2
            questions:
              - order: 1
                question_text: Item 1 to bring to the meeting
                options:
                  - option_text: A. Driving license
                    is_correct: false
                  - option_text: B. Passport
                    is_correct: true
                  - option_text: C. Tax bill
                    is_correct: false
                  - option_text: D. Employment contract
                    is_correct: false
                  - option_text: E. Reference from a friend or colleague
                    is_correct: false
                  - option_text: F. Reference from an employer
                    is_correct: false
              - order: 2
                question_text: Item 2 to bring to the meeting
                options:
                  - option_text: A. Driving license
                    is_correct: false
                  - option_text: B. Passport
                    is_correct: false
                  - option_text: C. Tax bill
                    is_correct: false
                  - option_text: D. Employment contract
                    is_correct: true
                  - option_text: E. Reference from a friend or colleague
                    is_correct: false
                  - option_text: F. Reference from an employer
                    is_correct: false
              - order: 3
                question_text: Item 3 to bring to the meeting
                options:
                  - option_text: A. Driving license
                    is_correct: false
                  - option_text: B. Passport
                    is_correct: false
                  - option_text: C. Tax bill
                    is_correct: false
                  - option_text: D. Employment contract
                    is_correct: false
                  - option_text: E. Reference from a friend or colleague
                    is_correct: true
                  - option_text: F. Reference from an employer
                    is_correct: false

          - title: Questions 9-10
            description: Choose the correct letter, A, B or C.
            block_type: multiple_choice
            order: 3
            questions:
              - order: 1
                question_text: What time do the caller and apartment manager decide to meet?
                options:
                  - option_text: A. 5:30 PM
                    is_correct: false
                  - option_text: B. 6:00 PM
                    is_correct: false
                  - option_text: C. 6:30 PM
                    is_correct: true
              - order: 2
                question_text: Where do they decide to meet?
                options:
                  - option_text: A. Near the manager's apartment
                    is_correct: false
                  - option_text: B. At the caller's future apartment
                    is_correct: true
                  - option_text: C. At the office
                    is_correct: false

  - title: Listening IELTS-up Sample 5.2
    description: Real IELTS-up listening sample (Section 2) with validated answer key.
    time_limit: 900
    is_active: true
    voice_url: https://ielts-up.com/listening/5.2.mp3
    parts:
      - title: Section 2
        order: 1
        blocks:
          - title: Questions 11-16
            description: Complete the table below. Write NO MORE THAN TWO WORDS AND/OR A NUMBER for each answer.
            block_type: table_completion
            order: 1
            table_completion: Ticket type | Ticket cost
            table_json:
              header:
                - Ticket type
                - Ticket cost
              rows:
                - - Adult ticket
                  - ____ pounds
                - - Child ticket (for children between 5 and 15 years)
                  - ____ pounds
                - - Children under ____ years
                  - free
                - - Reduced tariff (for full-time students and disabled visitors)
                  - ____ pounds
                - - ____ (can be used by up to 2 adults and 3 children)
                  - 55 pounds
                - - Annual membership
                  - ____ pounds
            questions:
              - order: 1
                question_text: Adult ticket cost
                answers:
                  - "24"
                  - twenty-four
              - order: 2
                question_text: Child ticket cost
                answers:
                  - "18"
                  - eighteen
              - order: 3
                question_text: Children under this age enter free
                answers:
                  - "5"
                  - five
              - order: 4
                question_text: Reduced tariff cost
                answers:
                  - "19"
                  - nineteen
              - order: 5
                question_text: Ticket type for up to 2 adults and 3 children
                answers:
                  - family ticket
              - order: 6
                question_text: Annual membership cost
                answers:
                  - "107"

          - title: Questions 17-20
            description: Complete the information about ordering tickets. Write NO MORE THAN TWO WORDS for each answer.
            block_type: note_completion
            order: 2
            questions:
              - order: 1
                question_text: The easiest way is to buy your tickets ___.
                answers:
                  - online
              - order: 2
                question_text: Make sure you receive a ___ of your booking.
                answers:
                  - confirmation email
                  - confirmation e-mail
              - order: 3
                question_text: The second way is to book your tickets ___.
                answers:
                  - by telephone
              - order: 4
                question_text: You can purchase the tickets ___ in ticket kiosks.
                answers:
                  - in person

