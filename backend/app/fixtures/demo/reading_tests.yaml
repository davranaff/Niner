  - title: Part 3 Water Management and Urban Resilience - Passage 3
    passage_number: 3
    content: Water Management and Urban Resilience case study 01, section 3. Community language initiatives balanced school
      programs, oral archives, and local media participation. The text includes policy evidence, implementation outcomes,
      and stakeholder perspectives.
