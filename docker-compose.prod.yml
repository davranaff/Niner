services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./.env.prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-18000}:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: arq app.workers.arq_worker.WorkerSettings
    env_file:
      - ./.env.prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_HOST_API: ${PROD_FRONTEND_API_ORIGIN:-https://api.bandnine.online}
        REACT_APP_ASSETS_API: ${PROD_FRONTEND_ASSETS_API:-}
        REACT_APP_MAPBOX_API: ${PROD_FRONTEND_MAPBOX_API:-}
        REACT_APP_DEFAULT_API_LANG: ${PROD_FRONTEND_DEFAULT_API_LANG:-uz}
        REACT_APP_AUTH_MOCK: ${PROD_FRONTEND_AUTH_MOCK:-false}
        REACT_APP_SPEAKING_USE_BACKEND_DECISIONS: ${PROD_FRONTEND_SPEAKING_USE_BACKEND_DECISIONS:-false}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-30000}:80"

  landing:
    build:
      context: ./bandnine-landing
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "${LANDING_PORT:-31000}:80"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bandnine}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-54320}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bandnine}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-63790}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
      - landing
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/prod/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
